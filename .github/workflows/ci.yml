name: CI

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      tests: ${{ steps.filter.outputs.tests }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - 'app/**'
              - 'components/**'
              - 'lib/**'
            tests:
              - '__tests__/**'
              - 'e2e/**'
            infra:
              - '.github/workflows/**'
              - 'package.json'
              - 'package-lock.json'

  quality:
    name: Quality (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: [changes]
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Done criteria
        run: npm run quality:done

      - name: Run unit tests
        if: needs.changes.outputs.app == 'true' || needs.changes.outputs.tests == 'true' || needs.changes.outputs.infra == 'true'
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        if: matrix.node == 20
        uses: codecov/codecov-action@v3
        with:
          directory: ./coverage

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-artifacts-node-${{ matrix.node }}
          path: |
            coverage/**
            junit.xml
          if-no-files-found: ignore

  runtime-smoke:
    name: Runtime smoke gate
    runs-on: ubuntu-latest
    needs: [quality]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run runtime smoke tests
        run: npm run test:e2e:smoke

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [quality, runtime-smoke]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
          if-no-files-found: ignore

  preview-check:
    name: Preview deploy readiness (non-prod)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [quality, runtime-smoke, changes]
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.tests == 'true' || needs.changes.outputs.infra == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/**
            test-results/**
          if-no-files-found: ignore
