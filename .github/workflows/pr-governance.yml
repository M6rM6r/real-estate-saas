name: PR Governance

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title and body
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = (pr?.title || '').trim();
            const body = (pr?.body || '').trim();

            if (title.length < 10) {
              core.setFailed('PR title must be at least 10 characters long.');
              return;
            }

            if (!body || body.length < 40) {
              core.setFailed('PR body must include implementation details (at least 40 characters).');
              return;
            }

            const requiredSections = ['## Scope', '## Validation'];
            const missing = requiredSections.filter((s) => !body.includes(s));
            if (missing.length > 0) {
              core.setFailed(`PR body missing required sections: ${missing.join(', ')}`);
            }
